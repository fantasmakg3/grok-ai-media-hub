<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok Studio Pro - خالد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); }
        
        /* انسيابية حركة القائمة */
        .nav-hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }
        .nav-visible { transform: translateY(0); opacity: 1; transition: all 0.3s ease-in-out; }
        
        /* تعديل موضع الإدخال عند التركيز */
        .input-container { transition: all 0.3s ease; bottom: 75px; }
        .input-focused { bottom: 15px !important; }

        #chat-messages { height: calc(100vh - 170px); scroll-behavior: smooth; }
        @media (min-width: 768px) { #chat-messages { height: calc(100vh - 130px); } .input-container { bottom: 20px !important; } }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen w-full">

    <aside class="hidden md:flex w-64 bg-slate-900 border-l border-slate-800 p-6 flex-col shadow-2xl">
        <h1 class="text-xl font-bold text-blue-500 mb-8 italic tracking-wider">GROK STUDIO</h1>
        <nav class="space-y-3 flex-1">
            <button onclick="switchView('chat')" class="w-full text-right p-4 rounded-2xl bg-blue-600/10 border border-blue-500/20 flex items-center gap-3"><span>💬</span> الدردشة</button>
            <button onclick="switchView('image')" class="w-full text-right p-4 rounded-2xl hover:bg-slate-800 transition-all flex items-center gap-3 text-slate-400"><span>🖼️</span> توليد الصور</button>
            <button onclick="switchView('edit')" class="w-full text-right p-4 rounded-2xl hover:bg-slate-800 transition-all flex items-center gap-3 text-slate-400"><span>🎨</span> التعديل</button>
        </nav>
        <div class="p-4 bg-slate-800/50 rounded-2xl text-xs border border-slate-700">
            <p class="text-slate-500 mb-1">الرصيد المتوفر</p>
            <p class="text-blue-400 font-bold text-lg">$4.37</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-slate-950">
        
        <header class="md:hidden flex justify-between items-center p-4 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md z-30">
            <span class="text-blue-500 font-bold italic">GROK STUDIO</span>
            <span class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold border border-blue-500/30">$4.37</span>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-5">
            <div class="flex justify-start">
                <div class="bg-slate-800/80 p-4 rounded-2xl rounded-tr-none max-w-[85%] text-sm border border-slate-700 shadow-sm">
                    أهلاً خالد! تم تحديث الواجهة. الأيقونات ستختفي الآن عند الكتابة لتعطيك مساحة أكبر. ماذا سنصنع اليوم؟
                </div>
            </div>
        </div>

        <div id="input-section" class="input-container fixed left-0 right-0 p-3 z-40">
            <div class="max-w-4xl mx-auto flex items-center gap-2 bg-slate-900/95 rounded-2xl px-4 py-1 border border-slate-700 shadow-2xl backdrop-blur-md">
                <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." 
                       class="flex-1 bg-transparent border-none outline-none py-3 text-sm text-white placeholder-slate-500">
                <button onclick="sendMessage()" class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-lg hover:scale-105 active:scale-95 transition-all shadow-lg shadow-blue-500/20">🚀</button>
            </div>
        </div>

        <nav id="bottom-nav" class="md:hidden fixed bottom-0 w-full glass flex justify-around items-center h-16 z-50 nav-visible">
            <button onclick="switchView('chat')" class="flex flex-col items-center gap-1 text-blue-500">
                <span class="text-xl">💬</span>
                <span class="text-[10px] font-bold">الدردشة</span>
            </button>
            <button onclick="switchView('image')" class="flex flex-col items-center gap-1 text-slate-500">
                <span class="text-xl">🖼️</span>
                <span class="text-[10px]">الصور</span>
            </button>
            <button onclick="switchView('edit')" class="flex flex-col items-center gap-1 text-slate-500">
                <span class="text-xl">🎨</span>
                <span class="text-[10px]">التعديل</span>
            </button>
            <button onclick="switchView('video')" class="flex flex-col items-center gap-1 text-slate-500">
                <span class="text-xl">🎬</span>
                <span class="text-[10px]">فيديو</span>
            </button>
        </nav>
    </main>

    <script>
        const userInput = document.getElementById('user-input');
        const bottomNav = document.getElementById('bottom-nav');
        const inputSection = document.getElementById('input-section');
        const chatMessages = document.getElementById('chat-messages');

        // إدارة ظهور واختفاء الأيقونات عند الكتابة
        userInput.addEventListener('focus', () => {
            if (window.innerWidth < 768) {
                bottomNav.classList.add('nav-hidden');
                inputSection.classList.add('input-focused');
            }
        });

        userInput.addEventListener('blur', () => {
            setTimeout(() => {
                bottomNav.classList.remove('nav-hidden');
                inputSection.classList.remove('input-focused');
            }, 150);
        });

        // تفعيل الإرسال بـ Enter
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // إظهار رسالة المستخدم
            chatMessages.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm shadow-md">${text}</div></div>`;
            userInput.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // رسالة انتظار
            const botId = 'bot-' + Date.now();
            chatMessages.innerHTML += `<div class="flex justify-start"><div id="${botId}" class="bg-slate-800 p-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm border border-slate-700 animate-pulse text-slate-400 italic">جاري التفكير...</div></div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, mode: 'chat' })
                });
                const data = await response.json();
                document.getElementById(botId).innerText = data.result;
                document.getElementById(botId).classList.remove('animate-pulse', 'text-slate-400', 'italic');
            } catch (e) {
                document.getElementById(botId).innerText = "عذراً، حدث خطأ في الاتصال بالسيرفر.";
            }
        }

        function switchView(mode) {
            // التبديل البرمجي سيتم تفعيله عند برمجة مود الصور والفيديو
            console.log("الوضع الحالي: " + mode);
        }
    </script>
</body>
</html>
