<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok AI - خالد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .chat-container { height: calc(100vh - 120px); overflow-y: auto; padding: 20px; }
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 20px; background: #1e293b; border-t: 1px solid #334155; }
    </style>
</head>
<body class="flex">

    <aside class="w-64 bg-slate-800 h-screen p-5 flex flex-col gap-4 border-l border-slate-700">
        <h1 class="text-xl font-bold text-blue-400 text-center mb-5">Grok AI Hub</h1>
        <button onclick="setMode('chat')" id="btn-chat" class="mode-btn bg-blue-600 p-3 rounded-lg text-right">💬 دردشة ذكية</button>
        <button onclick="setMode('image')" id="btn-image" class="mode-btn bg-slate-700 p-3 rounded-lg text-right">🖼️ توليد صورة</button>
        <button onclick="setMode('edit')" id="btn-edit" class="mode-btn bg-slate-700 p-3 rounded-lg text-right">🎨 تعديل صورة</button>
        <button onclick="setMode('video')" id="btn-video" class="mode-btn bg-slate-700 p-3 rounded-lg text-right">🎬 فيديو</button>
    </aside>

    <main class="flex-1 relative">
        <div id="chat-box" class="chat-container space-y-4">
            <div class="bg-slate-700 p-4 rounded-xl max-w-md">أهلاً خالد! أنا جاهز. اختر خدمة وابدأ الكتابة.</div>
        </div>

        <div class="input-area flex gap-3">
            <input type="text" id="user-input" placeholder="اكتب هنا..." class="flex-1 p-3 rounded-lg bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500">
            <button onclick="sendMessage()" class="bg-blue-600 px-8 py-3 rounded-lg font-bold">إرسال</button>
        </div>
    </main>

    <script>
        let currentMode = 'chat';

        // إضافة مراقب لزر Enter
        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.replace('bg-blue-600', 'bg-slate-700'));
            document.getElementById('btn-' + mode).classList.replace('bg-slate-700', 'bg-blue-600');
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="bg-blue-700 p-4 rounded-xl max-w-md mr-auto text-white shadow-lg animate-pulse">${text}</div>`;
            input.value = '';

            const botMsgId = 'bot-' + Date.now();
            chatBox.innerHTML += `<div id="${botMsgId}" class="bg-slate-700 p-4 rounded-xl max-w-md shadow-md">جاري المعالجة...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, mode: currentMode })
                });
                const data = await response.json();
                document.getElementById(botMsgId).innerText = data.result || data.error;
            } catch (e) {
                document.getElementById(botMsgId).innerText = "حدث خطأ في الاتصال بالسيرفر.";
            }
        }
    </script>
</body>
</html>
