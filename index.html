<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok Studio - Floating Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; overflow: hidden; }
        
        /* انيميشن القائمة العائمة */
        .fab-menu {
            transform: scale(0);
            transform-origin: bottom right;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab-menu.active { transform: scale(1); }
        
        #chat-messages { height: calc(100vh - 100px); scroll-behavior: smooth; }
        .glass-blur { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="h-screen w-full flex flex-col">

    <header class="p-4 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center shrink-0">
        <h1 class="text-blue-500 font-bold italic tracking-tighter text-lg">GROK STUDIO</h1>
        <div class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold">$4.37</div>
    </header>

    <main id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 pb-28">
        <div class="bg-slate-800/80 p-4 rounded-2xl rounded-tr-none max-w-[85%] text-sm border border-slate-700">
            أهلاً خالد! اضغط على زر (+) لاختيار المود (صور، فيديو، دردشة).
        </div>
    </main>

    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">
        <div id="fab-options" class="fab-menu flex flex-col gap-3 mb-2">
            <button onclick="selectMode('video')" class="flex items-center gap-2 bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-xl">
                <span class="text-xs">🎬 فيديو</span>
            </button>
            <button onclick="selectMode('edit')" class="flex items-center gap-2 bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-xl">
                <span class="text-xs">🎨 تعديل</span>
            </button>
            <button onclick="selectMode('image')" class="flex items-center gap-2 bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-xl">
                <span class="text-xs">🖼️ صور</span>
            </button>
            <button onclick="selectMode('chat')" class="flex items-center gap-2 bg-blue-600 p-3 rounded-xl shadow-xl">
                <span class="text-xs">💬 دردشة</span>
            </button>
        </div>
        
        <button id="main-fab" onclick="toggleFab()" class="bg-blue-600 w-14 h-14 rounded-2xl shadow-2xl flex items-center justify-center text-2xl transition-transform active:scale-90">
            <span id="fab-icon">+</span>
        </button>
    </div>

    <div class="fixed bottom-6 left-6 right-24 z-40">
        <div class="glass-blur rounded-2xl p-1 flex items-center border border-slate-700 shadow-2xl">
            <input type="text" id="user-input" placeholder="اكتب هنا..." 
                   class="flex-1 bg-transparent border-none outline-none p-3 text-sm text-white">
            <button onclick="sendMessage()" class="bg-blue-600 px-4 py-3 rounded-xl text-sm font-bold">إرسال</button>
        </div>
    </div>

    <script>
        let currentMode = 'chat';

        function toggleFab() {
            const menu = document.getElementById('fab-options');
            const icon = document.getElementById('fab-icon');
            menu.classList.toggle('active');
            icon.innerText = menu.classList.contains('active') ? '×' : '+';
        }

        function selectMode(mode) {
            currentMode = mode;
            toggleFab();
            // تغيير لون الزر ليعرف المستخدم المود المختار
            const btn = document.getElementById('main-fab');
            if(mode === 'chat') btn.className = "bg-blue-600 w-14 h-14 rounded-2xl shadow-2xl flex items-center justify-center text-2xl";
            else btn.className = "bg-indigo-600 w-14 h-14 rounded-2xl shadow-2xl flex items-center justify-center text-2xl";
            
            alert("تم الانتقال لوضع: " + mode);
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            const box = document.getElementById('chat-messages');
            box.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm shadow-md">${text}</div></div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            const botId = 'bot-' + Date.now();
            box.innerHTML += `<div class="flex justify-start"><div id="${botId}" class="bg-slate-800 p-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm border border-slate-700 animate-pulse">جاري تنفيذ طلبك (${currentMode})...</div></div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, mode: currentMode })
                });
                const data = await res.json();
                document.getElementById(botId).innerText = data.result;
                document.getElementById(botId).classList.remove('animate-pulse');
            } catch (e) {
                document.getElementById(botId).innerText = "خطأ في الاتصال بالسيرفر";
            }
        }
    </script>
</body>
</html>
