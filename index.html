<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok Studio - Sidebar Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; overflow: hidden; }
        
        /* تحريك القائمة الجانبية */
        #sidebar {
            transition: transform 0.3s ease-in-out;
            z-index: 100;
        }
        .sidebar-closed { transform: translateX(100%); }
        .sidebar-open { transform: translateX(0); }

        /* تعتيم الخلفية عند فتح القائمة */
        #overlay {
            display: none;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 90;
        }

        #chat-messages { height: calc(100vh - 80px); scroll-behavior: smooth; }
        .glass-input { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="h-screen w-full relative">

    <div id="overlay" class="fixed inset-0" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed top-0 right-0 h-full w-72 bg-slate-900 border-l border-slate-800 p-6 sidebar-closed shadow-2xl flex flex-col">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold text-blue-500 italic">القائمة</h2>
            <button onclick="toggleSidebar()" class="text-2xl">✕</button>
        </div>

        <nav class="flex-1 space-y-4">
            <button onclick="selectMode('chat')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-800 transition-all text-right">
                <span class="text-xl">💬</span> دردشة ذكية
            </button>
            <button onclick="selectMode('image')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-800 transition-all text-right">
                <span class="text-xl">🖼️</span> توليد صور
            </button>
            <button onclick="selectMode('edit')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-800 transition-all text-right">
                <span class="text-xl">🎨</span> تعديل صور
            </button>
            <button onclick="selectMode('video')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-800 transition-all text-right">
                <span class="text-xl">🎬 صناعة فيديو</span>
            </button>
        </nav>

        <div class="mt-auto p-4 bg-slate-800 rounded-2xl border border-slate-700">
            <p class="text-[10px] text-slate-500 mb-1 font-bold">رصيدك الحالي</p>
            <p class="text-blue-400 text-lg font-bold font-mono">$4.37</p>
        </div>
    </aside>

    <div class="flex flex-col h-full">
        <header class="p-4 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center shrink-0">
            <button onclick="toggleSidebar()" class="text-2xl p-2 hover:bg-slate-800 rounded-lg transition-all">☰</button>
            <h1 id="mode-title" class="text-sm font-bold text-slate-400 tracking-widest">الدردشة</h1>
            <div class="w-10 h-10 rounded-full bg-blue-600/20 flex items-center justify-center text-blue-400 font-bold border border-blue-500/20 text-xs">خ</div>
        </header>

        <main id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
            <div class="flex justify-start">
                <div class="bg-slate-800/80 p-4 rounded-2xl rounded-tr-none max-w-[85%] text-sm border border-slate-700 leading-relaxed shadow-sm">
                    مرحباً بك يا خالد في Grok Studio. افتح القائمة الجانبية لاختيار نوع الخدمة.
                </div>
            </div>
        </main>

        <div class="fixed bottom-0 w-full p-4 bg-gradient-to-t from-[#020617] via-[#020617]/90 to-transparent">
            <div class="max-w-4xl mx-auto glass-input rounded-2xl flex items-center p-1 shadow-2xl">
                <input type="text" id="user-input" placeholder="اطلب أي شيء..." 
                       class="flex-1 bg-transparent border-none outline-none p-3 text-sm text-white placeholder-slate-500">
                <button onclick="sendMessage()" class="bg-blue-600 px-6 py-3 rounded-xl text-xs font-bold hover:scale-105 active:scale-95 transition-all shadow-lg shadow-blue-500/30">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'chat';

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const isOpen = sidebar.classList.contains('sidebar-open');

            if (isOpen) {
                sidebar.classList.replace('sidebar-open', 'sidebar-closed');
                overlay.style.display = 'none';
            } else {
                sidebar.classList.replace('sidebar-closed', 'sidebar-open');
                overlay.style.display = 'block';
            }
        }

        function selectMode(mode) {
            currentMode = mode;
            const titles = {
                'chat': 'الدردشة الذكية',
                'image': 'توليد الصور',
                'edit': 'تعديل الصور',
                'video': 'صناعة الفيديو'
            };
            document.getElementById('mode-title').innerText = titles[mode];
            toggleSidebar(); // إغلاق القائمة بعد الاختيار
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            const box = document.getElementById('chat-messages');
            box.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm shadow-md">${text}</div></div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            const botId = 'bot-' + Date.now();
            box.innerHTML += `<div class="flex justify-start"><div id="${botId}" class="bg-slate-800 p-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm border border-slate-700 animate-pulse italic">جاري تنفيذ طلبك في وضع ${document.getElementById('mode-title').innerText}...</div></div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, mode: currentMode })
                });
                const data = await res.json();
                document.getElementById(botId).innerText = data.result;
                document.getElementById(botId).classList.remove('animate-pulse', 'italic');
            } catch (e) {
                document.getElementById(botId).innerText = "حدث خطأ فني، يرجى المحاولة لاحقاً.";
            }
        }

        // إرسال بـ Enter
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
