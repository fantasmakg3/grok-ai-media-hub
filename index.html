<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; margin: 0; padding: 0; overflow: hidden; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); }
        .active-nav { color: #3b82f6; border-top: 2px solid #3b82f6; }
        /* تحسين مظهر الدردشة في الجوال */
        #chat-messages { height: calc(100vh - 160px); }
        @media (min-width: 768px) {
            #chat-messages { height: calc(100vh - 120px); }
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen w-full">

    <aside class="hidden md:flex w-64 bg-slate-900 border-l border-slate-800 p-6 flex-col">
        <h1 class="text-xl font-bold text-blue-500 mb-8 italic">GROK STUDIO</h1>
        <nav class="space-y-2 flex-1">
            <button onclick="switchView('chat')" class="w-full text-right p-4 rounded-xl hover:bg-slate-800 transition-all flex items-center gap-3"><span>💬</span> الدردشة</button>
            <button onclick="switchView('image')" class="w-full text-right p-4 rounded-xl hover:bg-slate-800 transition-all flex items-center gap-3"><span>🖼️</span> توليد الصور</button>
            <button onclick="switchView('edit')" class="w-full text-right p-4 rounded-xl hover:bg-slate-800 transition-all flex items-center gap-3"><span>🎨</span> التعديل</button>
        </nav>
        <div class="p-4 bg-slate-800 rounded-2xl text-xs text-slate-400">
            رصيدك: $4.37
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-slate-950 overflow-hidden">
        
        <header class="md:hidden flex justify-between items-center p-4 border-b border-slate-800 bg-slate-900/50">
            <span class="text-blue-500 font-bold italic text-sm">GROK STUDIO</span>
            <span class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold">$4.37</span>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="bg-slate-800 p-4 rounded-2xl rounded-tr-none max-w-[85%] text-sm leading-relaxed border border-slate-700">
                أهلاً خالد. تم تحديث الواجهة لتناسب هاتفك تماماً. ماذا سنفعل الآن؟
            </div>
        </div>

        <div id="input-section" class="p-3 md:p-6 bg-slate-950/80 backdrop-blur-md pb-24 md:pb-6">
            <div class="max-w-4xl mx-auto flex items-center gap-2 bg-slate-900 rounded-full px-4 py-2 border border-slate-700 shadow-xl">
                <input type="text" id="user-input" placeholder="اسأل Grok..." class="flex-1 bg-transparent border-none outline-none py-2 text-sm">
                <button onclick="sendMessage()" class="bg-blue-600 w-10 h-10 rounded-full flex items-center justify-center text-lg hover:scale-105 transition-transform shrink-0">🚀</button>
            </div>
        </div>

        <nav class="md:hidden fixed bottom-0 w-full glass flex justify-around items-center h-16 safe-area-bottom z-50">
            <button onclick="switchView('chat')" class="flex flex-col items-center gap-1 active-nav px-4 h-full justify-center">
                <span class="text-xl">💬</span>
                <span class="text-[10px]">الدردشة</span>
            </button>
            <button onclick="switchView('image')" class="flex flex-col items-center gap-1 text-slate-500 px-4 h-full justify-center">
                <span class="text-xl">🖼️</span>
                <span class="text-[10px]">الصور</span>
            </button>
            <button onclick="switchView('edit')" class="flex flex-col items-center gap-1 text-slate-500 px-4 h-full justify-center">
                <span class="text-xl">🎨</span>
                <span class="text-[10px]">التعديل</span>
            </button>
            <button onclick="switchView('video')" class="flex flex-col items-center gap-1 text-slate-500 px-4 h-full justify-center">
                <span class="text-xl">🎬</span>
                <span class="text-[10px]">فيديو</span>
            </button>
        </nav>
    </main>

    <script>
        function switchView(mode) {
            // التبديل بين الواجهات في المستقبل
            console.log("Switching to: " + mode);
            // تحديث شكل الأزرار في الجوال
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav', 'text-slate-500'));
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            if(!input.value.trim()) return;
            
            const msgBox = document.getElementById('chat-messages');
            msgBox.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm shadow-lg">${input.value}</div></div>`;
            input.value = '';
            msgBox.scrollTop = msgBox.scrollHeight;
        }
    </script>
</body>
</html>
