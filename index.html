<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok Studio Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: #f1f5f9; overflow: hidden; }
        
        /* تأثير الزجاج الفاخر */
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .glass-nav { background: rgba(7, 10, 25, 0.8); backdrop-filter: blur(15px); border-left: 1px solid rgba(255,255,255,0.05); }
        
        /* تحريك القائمة الجانبية */
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        .sidebar-closed { transform: translateX(100%); }
        .sidebar-open { transform: translateX(0); }

        /* توهج أزرق خفيف */
        .blue-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        
        /* تخصيص السكرول بار */
        #chat-messages::-webkit-scrollbar { width: 4px; }
        #chat-messages::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        /* أنيميشن الرسائل */
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-anim { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="h-screen w-full relative">

    <div id="overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[90]" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed top-0 right-0 h-full w-80 glass-nav sidebar-closed shadow-2xl flex flex-col p-6">
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold italic">G</div>
                <h2 class="text-xl font-bold tracking-tight text-white">إعدادات Grok</h2>
            </div>
            <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-800 transition-all text-slate-400">✕</button>
        </div>

        <nav class="flex-1 space-y-3">
            <p class="text-[10px] text-slate-500 font-bold tracking-widest uppercase mb-4 px-2">الأدوات الذكية</p>
            <button onclick="selectMode('chat')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all text-right group">
                <span class="text-xl group-hover:scale-110 transition-transform">💬</span> الدردشة السريعة
            </button>
            <button onclick="selectMode('image')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all text-right group">
                <span class="text-xl group-hover:scale-110 transition-transform">🖼️</span> توليد الصور
            </button>
            <button onclick="selectMode('edit')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all text-right group">
                <span class="text-xl group-hover:scale-110 transition-transform">🎨</span> استوديو التعديل
            </button>
            <button onclick="selectMode('video')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all text-right group">
                <span class="text-xl group-hover:scale-110 transition-transform">🎬</span> صناعة الفيديو
            </button>
        </nav>

        <div class="mt-auto p-5 glass-card rounded-3xl border border-white/5">
            <div class="flex justify-between items-center mb-3">
                <span class="text-xs text-slate-400">الرصيد المتبقي</span>
                <span class="text-blue-400 font-bold">$4.37</span>
            </div>
            <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
                <div class="bg-blue-500 h-full w-[87%] rounded-full shadow-[0_0_10px_#3b82f6]"></div>
            </div>
            <p class="text-[10px] text-slate-500 mt-3 text-center">باقة بريميوم | خالد</p>
        </div>
    </aside>

    <div class="flex flex-col h-full relative">
        <header class="p-4 flex justify-between items-center border-b border-white/5 bg-slate-950/50 backdrop-blur-md">
            <button onclick="toggleSidebar()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-slate-900 border border-white/5 hover:border-blue-500/50 transition-all shadow-xl">
                <span class="text-xl">☰</span>
            </button>
            <div class="text-center">
                <h1 id="mode-title" class="text-xs font-bold text-slate-500 uppercase tracking-[0.2em]">الدردشة الذكية</h1>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center shadow-lg shadow-blue-900/20 font-bold">خ</div>
        </header>

        <main id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-40">
            <div class="flex justify-start message-anim">
                <div class="glass-card p-5 rounded-3xl rounded-tr-none max-w-[85%] text-sm leading-relaxed blue-glow">
                    أهلاً بك يا خالد. تم تطبيق التحسينات الجمالية. جرّب الاقتراحات الجاهزة بالأسفل! ✨
                </div>
            </div>
        </main>

        <div class="fixed bottom-0 w-full p-4 md:p-6 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent">
            <div class="max-w-4xl mx-auto flex gap-2 mb-4 overflow-x-auto no-scrollbar py-2">
                <button onclick="fillInput('توليد صورة واقعية لسيارة طائرة')" class="whitespace-nowrap bg-slate-900/80 border border-white/5 px-4 py-2 rounded-full text-[10px] hover:border-blue-500/50 transition-all">🖼️ صورة طائرة</button>
                <button onclick="fillInput('اكتب كود موقع احترافي')" class="whitespace-nowrap bg-slate-900/80 border border-white/5 px-4 py-2 rounded-full text-[10px] hover:border-blue-500/50 transition-all">💻 كود برمجي</button>
                <button onclick="fillInput('لخص لي آخر أخبار الذكاء الاصطناعي')" class="whitespace-nowrap bg-slate-900/80 border border-white/5 px-4 py-2 rounded-full text-[10px] hover:border-blue-500/50 transition-all">📰 ملخص أخبار</button>
            </div>

            <div class="max-w-4xl mx-auto glass-card rounded-[2rem] flex items-center p-2 shadow-2xl border-white/10 blue-glow focus-within:border-blue-500/50 transition-all">
                <input type="text" id="user-input" placeholder="اطلب أي شيء من Grok..." 
                       class="flex-1 bg-transparent border-none outline-none px-4 py-3 text-sm text-white placeholder-slate-500">
                <button onclick="sendMessage()" class="bg-blue-600 px-8 py-3.5 rounded-[1.5rem] text-xs font-bold hover:bg-blue-500 hover:scale-105 active:scale-95 transition-all shadow-xl shadow-blue-600/20">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'chat';

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const isOpen = sidebar.classList.contains('sidebar-open');

            if (isOpen) {
                sidebar.classList.replace('sidebar-open', 'sidebar-closed');
                overlay.style.display = 'none';
            } else {
                sidebar.classList.replace('sidebar-closed', 'sidebar-open');
                overlay.style.display = 'block';
            }
        }

        function fillInput(text) {
            document.getElementById('user-input').value = text;
        }

        function selectMode(mode) {
            currentMode = mode;
            const titles = {'chat': 'الدردشة الذكية', 'image': 'توليد الصور', 'edit': 'تعديل الصور', 'video': 'صناعة الفيديو'};
            document.getElementById('mode-title').innerText = titles[mode];
            toggleSidebar();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            const box = document.getElementById('chat-messages');
            box.innerHTML += `<div class="flex justify-end message-anim"><div class="bg-blue-600 p-4 rounded-3xl rounded-tl-none max-w-[85%] text-sm shadow-xl font-medium">${text}</div></div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            const botId = 'bot-' + Date.now();
            box.innerHTML += `<div class="flex justify-start message-anim"><div id="${botId}" class="glass-card p-4 rounded-3xl rounded-tr-none max-w-[85%] text-sm border border-white/5 animate-pulse italic text-slate-400 tracking-wide">جاري معالجة طلبك عبر Grok AI...</div></div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, mode: currentMode })
                });
                const data = await res.json();
                const botMsg = document.getElementById(botId);
                botMsg.innerText = data.result;
                botMsg.classList.remove('animate-pulse', 'italic', 'text-slate-400');
                botMsg.classList.add('blue-glow');
            } catch (e) {
                document.getElementById(botId).innerText = "حدث خطأ في الاتصال، يرجى المحاولة لاحقاً.";
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
