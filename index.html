<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok AI Hub - خالد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: sans-serif; }
        .chat-box { height: calc(100vh - 140px); overflow-y: auto; }
    </style>
</head>
<body class="flex h-screen text-white">

    <aside class="w-64 bg-slate-800 border-l border-slate-700 p-5 flex flex-col gap-3">
        <h1 class="text-xl font-bold text-blue-400 mb-5 text-center">Grok AI Hub</h1>
        <button onclick="setMode('chat')" id="btn-chat" class="mode-btn bg-blue-600 p-3 rounded-xl text-right transition-all">💬 دردشة ذكية</button>
        <button onclick="setMode('image')" id="btn-image" class="mode-btn bg-slate-700 p-3 rounded-xl text-right transition-all">🖼️ توليد صورة</button>
        <button onclick="setMode('edit')" id="btn-edit" class="mode-btn bg-slate-700 p-3 rounded-xl text-right transition-all">🎨 تعديل صورة</button>
        <button onclick="setMode('video')" id="btn-video" class="mode-btn bg-slate-700 p-3 rounded-xl text-right transition-all">🎬 فيديو</button>
    </aside>

    <main class="flex-1 flex flex-col">
        <div id="chat-container" class="chat-box p-6 space-y-4">
            <div class="bg-slate-700 p-4 rounded-2xl max-w-lg">أهلاً خالد! رصيدك المتبقي ($4.37) جاهز للاستخدام. اكتب سؤالك واضغط Enter.</div>
        </div>

        <div class="p-6 bg-slate-900 border-t border-slate-800">
            <div class="max-w-4xl mx-auto flex gap-3">
                <input type="text" id="user-input" placeholder="اكتب هنا..." 
                       class="flex-1 p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:ring-2 focus:ring-blue-500 text-white">
                <button onclick="sendMessage()" class="bg-blue-600 px-8 py-4 rounded-2xl font-bold hover:bg-blue-500 transition-all">إرسال</button>
            </div>
        </div>
    </main>

    <script>
        let currentMode = 'chat';

        // تفعيل زر Enter للإرسال
        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                sendMessage();
            }
        });

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.replace('bg-blue-600', 'bg-slate-700'));
            document.getElementById('btn-' + mode).classList.replace('bg-slate-700', 'bg-blue-600');
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const prompt = input.value.trim();
            if (!prompt) return;

            appendMsg('user', prompt);
            input.value = '';
            const botId = appendMsg('bot', 'جاري المعالجة...');

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, mode: currentMode })
                });
                const data = await response.json();
                document.getElementById(botId).innerText = data.result;
            } catch (e) {
                document.getElementById(botId).innerText = "حدث خطأ في الاتصال بالسيرفر.";
            }
        }

        function appendMsg(role, text) {
            const container = document.getElementById('chat-container');
            const id = 'msg-' + Date.now();
            const align = role === 'user' ? 'mr-auto bg-blue-700' : 'ml-auto bg-slate-700';
            container.innerHTML += `<div class="flex ${role === 'user' ? 'justify-end' : 'justify-start'}"><div id="${id}" class="${align} p-4 rounded-2xl max-w-lg shadow-lg animate-pulse text-sm">${text}</div></div>`;
            container.scrollTop = container.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
